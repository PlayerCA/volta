<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Thank You | Volta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="header">
      <div class="container header__inner">
        <a href="/" class="logo">
          <span class="logo__mark">⚡</span>
          <span class="logo__text">Volta</span>
        </a>
      </div>
    </header>

    <main>
      <section class="thankyou">
        <div class="container thankyou__inner">
          <div class="thankyou__icon">⚡</div>
          <h1 class="thankyou__title">We've got your request.</h1>
          <p class="thankyou__text">Thanks for getting in touch. A member of the Volta team will come back to you within one business day with a clear, no-obligation quote.</p>
          <a href="/" class="btn btn--primary">Back to Home</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer__bottom">
        <div class="container">
          <p>© 2026 Volta Energy Ltd. All rights reserved.</p>
        </div>
      </div>
    </footer>

  </body>
</html>
